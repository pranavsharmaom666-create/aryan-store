<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aryan Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">AryanStore</div>
  <input type="text" placeholder="Search products..." onkeyup="searchProduct(this.value)">
  <button onclick="viewCart()">Cart (<span id="cart-count">0</span>)</button>
</header>

<div class="banner">
  <h1>Welcome to Aryan Store</h1>
</div>

<div class="products">

  <!-- PRODUCT -->
  <div class="product" onclick="goToProduct('T-Shirt',499,'⭐⭐⭐⭐☆')">
    <img src="https://picsum.photos/200">
    <h3>T-Shirt</h3>
    <p>₹499</p>
    <p>⭐⭐⭐⭐☆</p>
    <button onclick="event.stopPropagation(); addToCart('T-Shirt',499)">Add to Cart</button>
  </div>

  <div class="product" onclick="goToProduct('Shoes',999,'⭐⭐⭐⭐⭐')">
    <img src="https://picsum.photos/201">
    <h3>Shoes</h3>
    <p>₹999</p>
    <p>⭐⭐⭐⭐⭐</p>
    <button onclick="event.stopPropagation(); addToCart('Shoes',999)">Add to Cart</button>
  </div>

  <div class="product" onclick="goToProduct('Watch',1499,'⭐⭐⭐⭐☆')">
    <img src="https://picsum.photos/202">
    <h3>Watch</h3>
    <p>₹1499</p>
    <p>⭐⭐⭐⭐☆</p>
    <button onclick="event.stopPropagation(); addToCart('Watch',1499)">Add to Cart</button>
  </div>

  <div class="product" onclick="goToProduct('Headphones',799,'⭐⭐⭐☆☆')">
    <img src="https://picsum.photos/203">
    <h3>Headphones</h3>
    <p>₹799</p>
    <p>⭐⭐⭐☆☆</p>
    <button onclick="event.stopPropagation(); addToCart('Headphones',799)">Add to Cart</button>
  </div>

  <div class="product" onclick="goToProduct('Mobile',12999,'⭐⭐⭐⭐☆')">
    <img src="https://picsum.photos/204">
    <h3>Mobile</h3>
    <p>₹12999</p>
    <p>⭐⭐⭐⭐☆</p>
    <button onclick="event.stopPropagation(); addToCart('Mobile',12999)">Add to Cart</button>
  </div>

  <div class="product" onclick="goToProduct('Laptop',45999,'⭐⭐⭐⭐⭐')">
    <img src="https://picsum.photos/205">
    <h3>Laptop</h3>
    <p>₹45999</p>
    <p>⭐⭐⭐⭐⭐</p>
    <button onclick="event.stopPropagation(); addToCart('Laptop',45999)">Add to Cart</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
